<div *ngIf="options" class="fixed inset-0 z-[999] flex items-center justify-center p-4 sm:p-6 lg:p-8" [@backdrop]>
  <!-- Immersive Backdrop -->
  <div class="absolute inset-0 bg-on-surface/40 backdrop-blur-[12px] transition-all" (click)="cancel()">
    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-tertiary/5"></div>
  </div>

  <!-- Dialog Card -->
  <div class="w-full max-w-md bg-surface-container-lowest/90 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.3)] relative overflow-hidden border border-white/20" 
       [@modal]
       role="dialog"
       aria-modal="true"
       [attr.aria-labelledby]="'confirm-title'"
       [attr.aria-describedby]="'confirm-message'">
    <!-- Content Section -->
    <div class="p-10 text-center space-y-6">
      <!-- Dynamic Icon based on type -->
      <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-surface-container-low relative group">
        <div class="absolute inset-0 bg-primary/10 rounded-[2rem] blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <span class="material-symbols-outlined text-5xl leading-none transition-transform group-hover:scale-110" 
              aria-hidden="true"
              [ngClass]="{
                'text-primary': options.type === 'primary' || !options.type,
                'text-error': options.type === 'danger',
                'text-warning': options.type === 'warning',
                'text-success': options.type === 'success'
              }"
              style="font-variation-settings: 'FILL' 1;">
          {{ options.type === 'danger' ? 'report' : (options.type === 'warning' ? 'warning' : (options.type === 'success' ? 'check_circle' : 'help')) }}
        </span>
      </div>
 
      <div class="space-y-3">
        <h3 id="confirm-title" class="text-2xl font-black text-on-surface tracking-tight">{{ options.title | translate:options.params }}</h3>
        <p id="confirm-message" class="text-on-surface font-bold leading-relaxed">{{ options.message | translate:options.params }}</p>
      </div>

      <!-- Optional Input Field (e.g. for Fee) -->
      <div *ngIf="options.showInput" class="mt-6 pt-4 animate-scale-up">
        <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] mb-2 block text-left pl-2 opacity-60">
          {{ 'BILLING.AMOUNT' | translate }} ({{ options.params?.currency || 'DH' }})
        </label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">payments</span>
          <input type="number" [(ngModel)]="options.inputValue" 
                 class="w-full bg-surface-container-low border-none rounded-2xl py-4 pl-12 pr-5 text-lg font-black text-on-surface shadow-inner outline-none focus:ring-4 focus:ring-primary/5 transition-all"
                 [placeholder]="options.inputPlaceholder || '0.00'">
        </div>
      </div>
    </div>

    <!-- Actions Section -->
    <div class="p-8 bg-surface-container-low/40 backdrop-blur-xl border-t border-white/10 flex gap-4">
      <button (click)="cancel()" 
              class="flex-1 py-4 text-xs font-black uppercase tracking-[0.2em] text-on-surface-variant hover:bg-surface-container-highest rounded-2xl transition-all border border-transparent active:scale-95">
        {{ options.cancelLabel || 'COMMON.CANCEL' | translate }}
      </button>
      <button (click)="confirm()" 
              [ngClass]="{
                'bg-primary shadow-primary/30': options.type === 'primary' || !options.type,
                'bg-error shadow-error/30': options.type === 'danger',
                'bg-warning shadow-warning/30': options.type === 'warning',
                'bg-success shadow-success/30': options.type === 'success'
              }"
              class="flex-1 py-4 !text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl hover:brightness-110 active:scale-95 transition-all">
        {{ options.confirmLabel || 'COMMON.CONFIRM' | translate }}
      </button>
    </div>
  </div>
</div>
