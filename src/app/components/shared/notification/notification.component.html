<!-- Toasts Layer -->
<div class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-4 pointer-events-none">
  <div *ngFor="let toast of toasts" 
       class="pointer-events-auto p-4 rounded-2xl bg-surface-container-lowest/80 backdrop-blur-xl border border-outline-variant/20 shadow-2xl flex items-center gap-4 min-w-[300px] animate-toast-in active:scale-95 transition-transform">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white shadow-sm" [ngClass]="getIconColor(toast.type)">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">{{ getIcon(toast.type) }}</span>
    </div>
    <div class="flex-1">
      <h4 class="text-xs font-black uppercase text-on-surface-variant tracking-widest">{{ (toast.title || '') | translate }}</h4>
      <p class="text-sm font-bold text-on-surface mt-0.5">{{ (toast.message || '') | translate:toast.params }}</p>
    </div>
    <button (click)="removeToast(toast.id)" class="p-2 text-on-surface-variant/40 hover:text-on-surface transition-colors">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>
  </div>
</div>

<!-- Modal Dialog Layer -->
<div *ngIf="activeDialog" class="fixed inset-0 z-[110] flex items-center justify-center p-6 sm:p-0">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-md animate-fade-in" (click)="cancelDialog()"></div>
  
  <!-- Dialog Card -->
  <div class="relative w-full max-w-md bg-surface-container-lowest/90 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] shadow-[0_40px_100px_-20px_rgba(0,0,0,0.5)] p-10 animate-dialog-in">
    <div class="flex flex-col items-center text-center">
      <div class="w-20 h-20 rounded-3xl bg-white shadow-xl flex items-center justify-center mb-6 ambient-glow" [ngClass]="getIconColor(activeDialog.type)">
        <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1; font-variation-settings: 'wght' 700;">{{ getIcon(activeDialog.type) }}</span>
      </div>
      <h3 class="text-2xl font-black text-on-surface mb-2 tracking-tight">{{ (activeDialog.title || '') | translate }}</h3>
      <p class="text-on-surface-variant font-medium leading-relaxed">{{ activeDialog.message | translate:activeDialog.params }}</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 mt-10">
      <button (click)="cancelDialog()" 
              class="flex-1 order-2 sm:order-1 px-8 py-4 bg-surface-container-high text-on-surface font-bold rounded-2xl hover:brightness-105 active:scale-95 transition-all">
        {{ (activeDialog.cancelLabel || '') | translate }}
      </button>
      <button (click)="confirmDialog()" 
              class="flex-1 order-1 sm:order-2 px-8 py-4 bg-primary text-white font-bold rounded-2xl hover:brightness-110 shadow-lg shadow-primary/20 active:scale-95 transition-all">
        {{ (activeDialog.confirmLabel || '') | translate }}
      </button>
    </div>
  </div>
</div>
