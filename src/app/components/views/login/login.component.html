<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=2000');">
  <div class="absolute inset-0 bg-primary/10 backdrop-blur-sm"></div>
  
  <div class="relative w-full max-w-md animate-fade-in-up">
    <!-- Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-surface-container-lowest rounded-3xl shadow-xl mb-4 ambient-glow">
        <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
      </div>
      <h1 class="text-4xl font-extrabold text-on-surface tracking-tight">MediFlow</h1>
      <p class="text-on-surface-variant font-medium mt-2">{{ 'AUTH.SUBTITLE' | translate }}</p>
    </div>

    <!-- Login Card -->
    <div class="glass-panel p-10 rounded-[2.5rem] shadow-2xl border border-white/50 bg-surface-container-lowest/70 backdrop-blur-xl">
      <h2 class="text-2xl font-bold text-on-surface mb-8 text-center">{{ 'AUTH.LOGIN_TITLE' | translate }}</h2>
      
      <form (submit)="onSubmit()" class="space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">{{ 'AUTH.USERNAME_LABEL' | translate }}</label>
          <div [ngClass]="{'border-error/50 ring-2 ring-error/10 bg-error/5': errors.username}"
               class="relative bg-surface-container-lowest/50 border border-outline-variant/20 rounded-2xl overflow-hidden shadow-sm transition-all group/field">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 focus-within:text-primary transition-colors">person</span>
            <input [(ngModel)]="username" name="username" type="text"
                   class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-sm focus:ring-0 outline-none transition-all placeholder:text-on-surface-variant/30 text-on-surface font-bold"
                   [placeholder]="'AUTH.USERNAME_PLACEHOLDER' | translate">
          </div>
          <p *ngIf="errors.username" class="text-[10px] font-bold text-error mt-1 pl-1 animate-fade-in">{{ 'VALIDATION.REQUIRED' | translate }}</p>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">{{ 'AUTH.PASSWORD_LABEL' | translate }}</label>
          <div [ngClass]="{'border-error/50 ring-2 ring-error/10 bg-error/5': errors.password}"
               class="relative bg-surface-container-lowest/50 border border-outline-variant/20 rounded-2xl overflow-hidden shadow-sm transition-all group/field">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 focus-within:text-primary transition-colors">lock</span>
            <input [(ngModel)]="password" name="password" [type]="hidePassword ? 'password' : 'text'"
                   class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-sm focus:ring-0 outline-none transition-all placeholder:text-on-surface-variant/30 text-on-surface font-bold"
                   placeholder="••••••••">
            <button type="button" (click)="hidePassword = !hidePassword"
                    class="absolute border-none bg-none outline-none right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
              <span class="material-symbols-outlined text-[20px]">{{ hidePassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <p *ngIf="errors.password" class="text-[10px] font-bold text-error mt-1 pl-1 animate-fade-in">{{ 'VALIDATION.REQUIRED' | translate }}</p>
        </div>

        <div *ngIf="error" class="bg-error/10 text-error text-xs font-bold p-4 rounded-xl flex items-center gap-3 animate-shake border border-error/10">
          <span class="material-symbols-outlined text-sm">error</span>
          {{ error | translate }}
        </div>

        <button type="submit" 
                class="w-full bg-primary text-white py-4 rounded-2xl font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
          {{ 'AUTH.LOGIN_BUTTON' | translate }}
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>

      <!-- Quick Session Selector for Demo -->
      <div class="mt-8 pt-6 border-t border-outline-variant/10">
        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest text-center mb-4 text-primary">{{ 'AUTH.DEMO_MODE' | translate }}</p>
        <div class="grid grid-cols-2 gap-3">
          <button (click)="selectDemoUser('dr.miller')" class="text-[10px] font-bold py-2 px-3 border border-primary/20 rounded-xl hover:bg-primary/5 transition-all text-primary">
            👨‍⚕️ {{ 'AUTH.DEMO_DOCTOR' | translate }}
          </button>
          <button (click)="selectDemoUser('amine.b')" class="text-[10px] font-bold py-2 px-3 border border-primary/20 rounded-xl hover:bg-primary/5 transition-all text-primary">
            👩‍💼 {{ 'AUTH.DEMO_SECRETARY' | translate }}
          </button>
          <button (click)="selectDemoUser('admin.sophie')" class="text-[10px] font-bold py-2 px-3 border border-primary/20 rounded-xl hover:bg-primary/5 transition-all text-primary">
            🔐 {{ 'AUTH.DEMO_ADMIN' | translate }}
          </button>
          <button (click)="selectDemoUser('superadmin')" class="text-[10px] font-bold py-2 px-3 border border-primary/20 rounded-xl hover:bg-primary/5 transition-all text-primary">
            🌐 {{ 'AUTH.DEMO_SUPERADMIN' | translate }}
          </button>
        </div>
      </div>
    </div>

    <div class="flex justify-center mt-6">
      <button routerLink="/help" class="flex items-center gap-2 text-[10px] font-black uppercase text-primary tracking-[0.2em] bg-surface-container-lowest/50 px-4 py-2 rounded-full hover:bg-surface-container-lowest transition-all shadow-sm">
        <span class="material-symbols-outlined text-[14px]">help_center</span>
        {{ 'AUTH.USER_GUIDE' | translate }}
      </button>
    </div>

    <p class="text-center mt-8 text-on-surface-variant/60 text-[11px] font-medium">
      {{ 'AUTH.FOOTER' | translate }}
    </p>
  </div>
</div>
