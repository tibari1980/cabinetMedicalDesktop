<div class="login-container">
  <!-- Immersive Background Layer -->
  <div class="bg-orb p1"></div>
  <div class="bg-orb p2"></div>
  <div class="bg-orb p3"></div>
  <div class="glass-mesh"></div>

  <div class="login-content">
    <!-- Brand Identity -->
    <div class="brand-section animate-item">
      <div class="logo-box">
        <img src="assets/logo.png" alt="MediFlow Logo" class="main-logo-img">
      </div>
      <h1 class="brand-name">MediFlow</h1>
      <p class="brand-tagline">{{ 'AUTH.SUBTITLE' | translate }}</p>
    </div>

    <!-- Main Login Card -->
    <div class="glass-card animate-item delay-1" role="main">
      <h2 class="form-title">{{ 'AUTH.LOGIN_TITLE' | translate }}</h2>
      
      <form (submit)="onSubmit()" class="login-form" novalidate>
        <!-- Username Field -->
        <div class="input-group">
          <label for="username" class="input-label">{{ 'AUTH.USERNAME_LABEL' | translate }}</label>
          <div class="input-wrapper" [class.error]="errors.username">
            <span class="material-symbols-outlined field-icon" aria-hidden="true">person</span>
            <input [(ngModel)]="username" name="username" type="text"
                   id="username"
                   class="login-input"
                   [attr.aria-invalid]="!!errors.username"
                   [attr.aria-describedby]="errors.username ? 'username-error' : null"
                   [placeholder]="'AUTH.USERNAME_PLACEHOLDER' | translate">
          </div>
          <p *ngIf="errors.username" id="username-error" class="text-[10px] font-bold text-red-500 mt-2 pl-2" role="alert">{{ 'VALIDATION.REQUIRED' | translate }}</p>
        </div>

        <!-- Password Field -->
        <div class="input-group">
          <label for="password" class="input-label">{{ 'AUTH.PASSWORD_LABEL' | translate }}</label>
          <div class="input-wrapper" [class.error]="errors.password">
            <span class="material-symbols-outlined field-icon" aria-hidden="true">lock</span>
            <input [(ngModel)]="password" name="password" [type]="hidePassword ? 'password' : 'text'"
                   id="password"
                   class="login-input"
                   [attr.aria-invalid]="!!errors.password"
                   [attr.aria-describedby]="errors.password ? 'password-error' : null"
                   placeholder="••••••••">
            <button type="button" (click)="hidePassword = !hidePassword" class="toggle-pass" [attr.aria-label]="hidePassword ? 'Afficher le mot de passe' : 'Masquer le mot de passe'">
              <span class="material-symbols-outlined" aria-hidden="true">{{ hidePassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <p *ngIf="errors.password" id="password-error" class="text-[10px] font-bold text-red-500 mt-2 pl-2" role="alert">{{ 'VALIDATION.REQUIRED' | translate }}</p>
        </div>

        <!-- Error Messaging -->
        <div *ngIf="error" class="error-alert" role="alert">
          <span class="material-symbols-outlined" aria-hidden="true">error</span>
          {{ error | translate }}
        </div>

        <!-- Submit Action -->
        <button type="submit" class="btn-submit">
          <span>{{ 'AUTH.LOGIN_BUTTON' | translate }}</span>
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
      </form>

      <!-- Quick Session Selector (Demo Mode) -->
      <div class="demo-section" role="region" aria-label="Sélecteur de session de démonstration">
        <p class="demo-title">{{ 'AUTH.DEMO_MODE' | translate }}</p>
        <div class="demo-grid">
          <button type="button" (click)="selectDemoUser('dr.miller')" class="demo-btn" aria-label="Se connecter en tant que Médecin">
            <span aria-hidden="true">👨‍⚕️</span> {{ 'AUTH.DEMO_DOCTOR' | translate }}
          </button>
          <button type="button" (click)="selectDemoUser('amine.b')" class="demo-btn" aria-label="Se connecter en tant que Secrétaire">
            <span aria-hidden="true">👩‍💼</span> {{ 'AUTH.DEMO_SECRETARY' | translate }}
          </button>
          <button type="button" (click)="selectDemoUser('admin.sophie')" class="demo-btn" aria-label="Se connecter en tant qu'Administrateur">
            <span aria-hidden="true">🔐</span> {{ 'AUTH.DEMO_ADMIN' | translate }}
          </button>
          <button type="button" (click)="selectDemoUser('superadmin')" class="demo-btn" aria-label="Se connecter en tant que Super Administrateur">
            <span aria-hidden="true">🌐</span> {{ 'AUTH.DEMO_SUPERADMIN' | translate }}
          </button>
        </div>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="login-footer animate-item delay-2">
      <button routerLink="/help" class="btn-help">
        <span class="material-symbols-outlined">help_center</span>
        {{ 'AUTH.USER_GUIDE' | translate }}
      </button>
      <p class="footer-copy">
        {{ 'AUTH.FOOTER' | translate }}
      </p>
    </div>
  </div>
</div>
