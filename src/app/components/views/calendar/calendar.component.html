<div class="space-y-6">
  <!-- Header with Date Navigation -->
  <section class="flex flex-col md:flex-row justify-between items-center bg-surface-container-lowest p-6 rounded-[2.5rem] shadow-sm border border-outline-variant/10 ambient-glow gap-4 no-print">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <button (click)="changeDate(-1)" aria-label="Jour précédent" class="p-2 hover:bg-surface-container-high rounded-full transition-all text-on-surface-variant">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <div class="text-center min-w-[150px]">
          <h2 class="text-xl font-bold text-on-surface">{{ selectedDate | date:'EEEE dd MMMM' }}</h2>
          <p class="text-[10px] text-primary uppercase font-bold tracking-widest">{{ selectedDate | date:'yyyy' }}</p>
        </div>
        <button (click)="changeDate(1)" aria-label="Jour suivant" class="p-2 hover:bg-surface-container-high rounded-full transition-all text-on-surface-variant">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
      <button (click)="resetToToday()" class="text-xs font-bold text-primary px-4 py-2 bg-primary/5 rounded-full hover:bg-primary/10 transition-all">
        Aujourd'hui
      </button>
    </div>

    <div class="flex items-center gap-3">
      <button (click)="printAgenda()" class="flex items-center gap-2 px-6 py-2.5 bg-surface-container-high text-on-surface-variant rounded-xl font-bold text-sm hover:brightness-95 transition-all">
        <span class="material-symbols-outlined text-lg">print</span>
        Imprimer
      </button>
      <button (click)="openNewAptModal()" class="flex items-center gap-2 px-6 py-2.5 bg-primary text-white rounded-xl font-bold text-sm hover:brightness-110 shadow-lg shadow-primary/20 transition-all">
        <span class="material-symbols-outlined text-lg">add</span>
        Nouveau RDV
      </button>
    </div>
  </section>

  <!-- Calendar Grid -->
  <div class="bg-surface-container-lowest rounded-[2.5rem] shadow-sm border border-outline-variant/10 overflow-hidden ambient-glow relative">
    <div class="grid grid-cols-[100px_1fr] divide-x divide-outline-variant/5">
      
      <!-- Time Labels Column -->
      <div class="bg-surface-container-lowest/50 py-4">
        <div *ngFor="let slot of timeSlots; trackBy: trackBySlot" class="h-20 flex flex-col items-center justify-start pt-2 border-b border-outline-variant/5 text-on-surface-variant/40">
          <span class="text-xs font-bold">{{ slot }}</span>
        </div>
      </div>

      <!-- Appointments Column -->
      <div class="relative py-4">
        <div *ngFor="let slot of timeSlots; trackBy: trackBySlot" class="h-20 border-b border-outline-variant/5 group relative px-4 flex items-center">
          <!-- Hover indicator to add RDV -->
          <button (click)="openNewAptModal(slot)" aria-label="Ajouter rendez-vous à ce créneau"
                  class="absolute inset-0 opacity-0 group-hover:opacity-100 bg-primary/5 flex items-center justify-center transition-opacity z-10 no-print">
            <span class="material-symbols-outlined text-primary text-xl">add_circle</span>
          </button>

          <!-- Appointment Cards -->
          <div *ngFor="let apt of getAppointmentsForSlot(slot); trackBy: trackByAppointment" 
               class="absolute inset-y-1 left-4 right-4 bg-primary-container text-white rounded-2xl p-4 shadow-sm border border-primary/10 flex items-center justify-between group/card hover:scale-[1.01] transition-all z-20 cursor-pointer">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-xl bg-surface-container-lowest text-primary flex items-center justify-center font-bold shadow-sm">
                {{ apt.patientName[0] }}
              </div>
              <div>
                <p class="text-sm font-extrabold leading-tight">{{ apt.patientName }}</p>
                <div class="flex items-center gap-2 mt-1">
                  <span class="text-[9px] font-black uppercase tracking-widest bg-white/20 px-2 py-0.5 rounded-md">{{ apt.type }}</span>
                  <span class="text-[9px] font-bold opacity-80">• {{ apt.duration }} min</span>
                </div>
              </div>
            </div>
            <div class="text-right flex items-center gap-2">
              <span class="text-[9px] font-extrabold bg-tertiary-container text-tertiary px-3 py-1 rounded-full uppercase">{{ apt.status }}</span>
              <div class="flex opacity-0 group-hover/card:opacity-100 transition-opacity bg-surface-container-lowest/50 backdrop-blur-md rounded-xl p-1 gap-1">
                <button (click)="updateAptStatus(apt, 'Terminé', $event)" aria-label="Marquer comme terminé" class="material-symbols-outlined text-sm p-1.5 hover:bg-success/20 text-success rounded-lg transition-colors">check_circle</button>
                <button (click)="updateAptStatus(apt, 'Annulé', $event)" aria-label="Annuler ce rendez-vous" class="material-symbols-outlined text-sm p-1.5 hover:bg-error/20 text-error rounded-lg transition-colors">cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Appointment Creation Modal (Premium Glassmorphism Edition) -->
  <div *ngIf="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 no-print">
    <!-- Immersive Radial Overlay -->
    <div class="absolute inset-0 bg-on-surface/30 backdrop-blur-[10px] animate-fade-in transition-all" (click)="showModal = false">
      <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-tertiary/5"></div>
    </div>
    
    <!-- Modal Glass Shell -->
    <div class="bg-surface-container-lowest/90 backdrop-blur-2xl w-full max-w-xl rounded-[2.5rem] shadow-2xl relative animate-scale-up overflow-hidden border border-white/20">
      <!-- Decorative Glow Elements -->
      <div class="absolute -top-12 -left-12 w-32 h-32 bg-primary/20 rounded-full blur-3xl opacity-30 select-none"></div>
      <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-tertiary/20 rounded-full blur-3xl opacity-30 select-none"></div>

      <div class="p-8 border-b border-outline-variant/10 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary">
            <span class="material-symbols-outlined text-2xl" translate="no">event_available</span>
          </div>
          <div>
            <h3 class="text-2xl font-black text-on-surface tracking-tight">Prendre un Rendez-vous</h3>
            <p class="text-xs text-on-surface-variant font-bold uppercase tracking-widest mt-0.5 opacity-60">Planification Agenda</p>
          </div>
        </div>
        <button (click)="showModal = false" aria-label="Fermer la modale" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error/10 hover:text-error transition-all group">
          <span class="material-symbols-outlined text-2xl group-hover:rotate-90 transition-transform" translate="no">close</span>
        </button>
      </div>

      <div class="p-8 space-y-6 max-h-[65vh] overflow-y-auto relative z-10 custom-scrollbar">
        <!-- Patient Selection Toggle -->
        <div class="flex items-center justify-between p-1.5 bg-surface-container-low rounded-[1.25rem] mb-4">
          <button (click)="isNewPatient = false" 
                  [class]="!isNewPatient ? 'bg-surface-container-lowest shadow-md text-primary font-bold' : 'text-on-surface-variant font-medium opacity-60'"
                  class="flex-1 py-3 text-xs rounded-[0.875rem] transition-all transform active:scale-95">Patient Existant</button>
          <button (click)="isNewPatient = true" 
                  [class]="isNewPatient ? 'bg-surface-container-lowest shadow-md text-primary font-bold' : 'text-on-surface-variant font-medium opacity-60'"
                  class="flex-1 py-3 text-xs rounded-[0.875rem] transition-all transform active:scale-95">Nouveau Patient</button>
        </div>

        <!-- Existing Patient Selection -->
        <div class="space-y-4 animate-fade-in" *ngIf="!isNewPatient">
          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black text-on-surface-variant tracking-[0.2em] pl-1 opacity-70">Sélectionner un Patient</label>
            <div class="relative">
              <select id="cal-sel-pat" [(ngModel)]="newApt.patientId" 
                      class="w-full bg-surface-container-low border-2 border-transparent rounded-2xl py-4 px-5 text-sm font-semibold outline-none focus:border-primary/20 focus:bg-surface-container-lowest appearance-none transition-all">
                <option value="" disabled selected>Choisir dans la liste...</option>
                <option *ngFor="let p of patients; trackBy: trackByPatient" [value]="p.id">{{ p.firstName }} {{ p.lastName }}</option>
              </select>
              <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-40">expand_more</span>
            </div>
          </div>
        </div>

        <!-- New Patient Detailed Form -->
        <div class="space-y-5 animate-fade-in" *ngIf="isNewPatient">
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] pl-1 opacity-70">Nom *</label>
              <input [(ngModel)]="newPatient.lastName" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm transition-all" placeholder="Nom">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] pl-1 opacity-70">Prénom *</label>
              <input [(ngModel)]="newPatient.firstName" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm transition-all" placeholder="Prénom">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] pl-1 opacity-70">Téléphone *</label>
              <input [(ngModel)]="newPatient.phone" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm transition-all" placeholder="+212 ...">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] pl-1 opacity-70">Date Naissance *</label>
              <input type="date" [(ngModel)]="newPatient.birthDate" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm transition-all">
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black text-primary tracking-[0.2em] pl-1 opacity-70">Adresse Complète</label>
            <textarea [(ngModel)]="newPatient.address" class="w-full bg-surface-container-low border-none rounded-2xl py-3 px-5 text-sm font-semibold outline-none shadow-sm transition-all rows-2" placeholder="Adresse du patient..."></textarea>
          </div>
        </div>

        <!-- Appointment Specifics -->
        <div class="space-y-5 pt-8 border-t border-outline-variant/10">
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-on-surface-variant tracking-[0.2em] pl-1 opacity-70">Heure du RDV</label>
              <input type="time" [(ngModel)]="newApt.time" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] uppercase font-black text-on-surface-variant tracking-[0.2em] pl-1 opacity-70">Durée (Min)</label>
              <div class="relative">
                <input type="number" [(ngModel)]="newApt.duration" step="15" class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-sm font-semibold outline-none shadow-sm">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-primary opacity-40">MIN</span>
              </div>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black text-on-surface-variant tracking-[0.2em] pl-1 opacity-70">Type d'Acte</label>
            <select id="cal-type" [(ngModel)]="newApt.type" class="w-full bg-surface-container-low border-2 border-transparent rounded-2xl py-4 px-5 text-sm font-semibold outline-none focus:border-primary/20 appearance-none transition-all">
              <option value="Consultation Générale">Consultation Générale</option>
              <option value="Suivi">Suivi</option>
              <option value="Urgence">Urgence</option>
              <option value="Examen / Analyse">Examen / Analyse</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Final Actions -->
      <div class="p-8 bg-surface-container-low/40 backdrop-blur-xl flex gap-4 relative z-10 border-t border-outline-variant/10">
        <button (click)="showModal = false" class="flex-1 py-4 text-sm font-bold text-on-surface-variant hover:bg-surface-container-highest rounded-2xl transition-all border border-transparent hover:border-outline-variant/10">Annuler</button>
        <button (click)="submitAppointment()" class="flex-1 py-4 bg-primary text-white rounded-2xl font-black text-sm shadow-xl shadow-primary/30 hover:shadow-primary/40 hover:brightness-110 active:scale-95 transition-all ambient-glow">Valider le Rendez-vous</button>
      </div>
    </div>
  </div>
</div>

<!-- Print Only Styles -->
<style>
  @media print {
    .no-print { display: none !important; }
    body { background: white !important; }
    main { margin: 0 !important; padding: 0 !important; }
    .glass-panel, .ambient-glow { box-shadow: none !important; border: 1px solid #eee !important; }
  }
</style>
